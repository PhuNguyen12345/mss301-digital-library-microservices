worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    large_client_header_buffers 4 16k;

    # Docker's embedded DNS. Re-resolving here (instead of nginx's
    # default one-time resolution at startup) keeps upstreams working
    # after a container is stopped/recreated with a new internal IP.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        server_name keycloak.huynq.space;

        location / {
            set $upstream_keycloak_app http://keycloak_app:8080;
            proxy_pass $upstream_keycloak_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;

            proxy_buffer_size 16k;
            proxy_buffers 4 16k;
            proxy_busy_buffers_size 32k;
        }
    }

    server {
        listen 80;
        server_name api.huynq.space;

        location / {
            set $upstream_api_gateway http://api-gateway:8080;
            proxy_pass $upstream_api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    server {
        listen 80;
        server_name dns.huynq.space;

        location / {
            set $upstream_eureka_server http://eureka-server:8761;
            proxy_pass $upstream_eureka_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
        }
    }

    server {
        listen 80 default_server;
        server_name _;
        return 404;
    }
}
