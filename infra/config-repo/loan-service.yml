server:
  address: ${INTERNAL_SERVICE_BIND_ADDRESS:127.0.0.1}
  port: ${LOAN_SERVICE_PORT:8083}

spring:
  application:
    name: loan-service
  datasource:
    url: ${LOAN_DB_URL:jdbc:postgresql://localhost:5432/loan_service_dbs}
    username: ${LOAN_DB_USERNAME:postgres}
    password: ${LOAN_DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

services:
  internal-api-key: ${INTERNAL_API_KEY}
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
    default-book-value: ${DEFAULT_BOOK_VALUE:250000}
  member:
    base-url: ${MEMBER_SERVICE_URL:http://localhost:8083}
  fine:
    base-url: ${FINE_SERVICE_URL:http://localhost:8086}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

loan:
  jobs:
    overdue-fine-enabled: ${OVERDUE_FINE_JOB_ENABLED:true}
    overdue-fine-cron: ${OVERDUE_FINE_JOB_CRON:0 15 2 * * *}

eureka:
  instance:
    hostname: ${INTERNAL_SERVICE_HOST:localhost}
    prefer-ip-address: false
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
