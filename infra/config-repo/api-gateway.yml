server:
  port: 8080

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}
  cloud:
    circuitbreaker:
      bulkhead:
        resilience4j:
          enabled: true
      resilience4j:
        # Reactive Gateway traffic must use a semaphore bulkhead; a fixed
        # thread pool would break the non-blocking execution model.
        enableSemaphoreDefaultBulkhead: true
    gateway:
      server:
        webflux:
          httpclient:
            # Global network guardrails. Per-route metadata below overrides the
            # response timeout for operations that legitimately need more time.
            connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:1000}
            response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:5s}
          routes:
            - id: catalog-service
              uri: lb://CATALOG-SERVICE
              predicates:
                - Path=/api/catalog/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalogCircuitBreaker
                    fallbackUri: forward:/fallback/catalog
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                # Retry is deliberately limited to idempotent reads. Never add
                # POST/PUT/PATCH/DELETE here without an idempotency-key design.
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    exceptions: java.io.IOException,java.util.concurrent.TimeoutException,io.netty.handler.timeout.ReadTimeoutException
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: catalog-files
              uri: lb://CATALOG-SERVICE
              metadata:
                response-timeout: ${GATEWAY_FILE_RESPONSE_TIMEOUT_MS:30000}
              predicates:
                - Path=/files/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalogFilesCircuitBreaker
                    fallbackUri: forward:/fallback/catalog-files
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT

            - id: loan-service
              uri: lb://LOAN-SERVICE
              predicates:
                - Path=/api/v1/loans/**,/api/v1/rent-books
              filters:
                - name: CircuitBreaker
                  args:
                    name: loanCircuitBreaker
                    fallbackUri: forward:/fallback/loan
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    exceptions: java.io.IOException,java.util.concurrent.TimeoutException,io.netty.handler.timeout.ReadTimeoutException
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: member-auth
              uri: lb://MEMBER-SERVICE
              metadata:
                response-timeout: ${GATEWAY_AUTH_RESPONSE_TIMEOUT_MS:15000}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: memberAuthCircuitBreaker
                    fallbackUri: forward:/fallback/member-auth
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT

            - id: member-service
              uri: lb://MEMBER-SERVICE
              predicates:
                - Path=/api/v1/members/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: memberCircuitBreaker
                    fallbackUri: forward:/fallback/member
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    exceptions: java.io.IOException,java.util.concurrent.TimeoutException,io.netty.handler.timeout.ReadTimeoutException
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: fine-service
              uri: lb://FINE-SERVICE
              predicates:
                - Path=/api/fines/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: fineCircuitBreaker
                    fallbackUri: forward:/fallback/fine
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    exceptions: java.io.IOException,java.util.concurrent.TimeoutException,io.netty.handler.timeout.ReadTimeoutException
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false

            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationCircuitBreaker
                    fallbackUri: forward:/fallback/notification
                    statusCodes: INTERNAL_SERVER_ERROR,BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                - name: Retry
                  args:
                    retries: 2
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    methods: GET
                    exceptions: java.io.IOException,java.util.concurrent.TimeoutException,io.netty.handler.timeout.ReadTimeoutException
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2
                      basedOnPreviousValue: false
  
management:
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - gateway
          - metrics
          - circuitbreakers

# One breaker per downstream prevents a Catalog outage from opening the circuit
# for Member, Loan, or Fine. The shared defaults keep their behavior consistent.
resilience4j:
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: ${GATEWAY_BULKHEAD_MAX_CONCURRENT_CALLS:50}
        maxWaitDuration: 0
    instances:
      catalogCircuitBreaker:
        baseConfig: default
      catalogFilesCircuitBreaker:
        maxConcurrentCalls: ${GATEWAY_FILE_BULKHEAD_MAX_CONCURRENT_CALLS:20}
        maxWaitDuration: 0
      loanCircuitBreaker:
        baseConfig: default
      memberAuthCircuitBreaker:
        maxConcurrentCalls: ${GATEWAY_AUTH_BULKHEAD_MAX_CONCURRENT_CALLS:20}
        maxWaitDuration: 0
      memberCircuitBreaker:
        baseConfig: default
      fineCircuitBreaker:
        baseConfig: default
      notificationCircuitBreaker:
        baseConfig: default
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      catalogCircuitBreaker:
        baseConfig: default
      catalogFilesCircuitBreaker:
        baseConfig: default
      loanCircuitBreaker:
        baseConfig: default
      memberAuthCircuitBreaker:
        baseConfig: default
      memberCircuitBreaker:
        baseConfig: default
      fineCircuitBreaker:
        baseConfig: default
      notificationCircuitBreaker:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: ${GATEWAY_CIRCUIT_TIMEOUT:18s}
        cancelRunningFuture: true
    instances:
      catalogCircuitBreaker:
        baseConfig: default
      catalogFilesCircuitBreaker:
        timeoutDuration: ${GATEWAY_FILE_CIRCUIT_TIMEOUT:35s}
        cancelRunningFuture: true
      loanCircuitBreaker:
        baseConfig: default
      memberAuthCircuitBreaker:
        timeoutDuration: ${GATEWAY_AUTH_CIRCUIT_TIMEOUT:18s}
        cancelRunningFuture: true
      memberCircuitBreaker:
        baseConfig: default
      fineCircuitBreaker:
        baseConfig: default
      notificationCircuitBreaker:
        baseConfig: default

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/digilib-realm}

gateway:
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://huynq.space,https://huynq.space}
