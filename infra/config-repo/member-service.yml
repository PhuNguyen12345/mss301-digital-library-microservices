server:
  address: ${INTERNAL_SERVICE_BIND_ADDRESS:0.0.0.0}
  port: ${MEMBER_SERVICE_PORT:8082}

spring:
  application:
    name: member-service

  # Reactive Database Setup via R2DBC
  r2dbc:
    url: r2dbc:postgresql://${MEMBER_DB_HOST:localhost}:${MEMBER_DB_PORT:5432}/${MEMBER_DB_NAME:digilib_member}
    username: ${MEMBER_DB_USERNAME}
    password: ${MEMBER_DB_PASSWORD}

  # Flyway uses JDBC but must target the same database and credentials as R2DBC.
  flyway:
    enabled: true
    url: jdbc:postgresql://${MEMBER_DB_HOST:localhost}:${MEMBER_DB_PORT:5432}/${MEMBER_DB_NAME:digilib_member}
    user: ${MEMBER_DB_USERNAME}
    password: ${MEMBER_DB_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true

  sql:
    init:
      mode: always

  # KEYCLOAK_ISSUER_URI is the single source of truth for JWT validation.
  # Spring Security discovers the JWK set from the issuer metadata.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:digilib-realm}
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/digilib-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:digilib-auth}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  require-email-verification: ${KEYCLOAK_REQUIRE_EMAIL_VERIFICATION:true}

services:
  internal-api-key: ${INTERNAL_API_KEY}

eureka:
  instance:
    hostname: ${INTERNAL_SERVICE_HOST:member-service}
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
