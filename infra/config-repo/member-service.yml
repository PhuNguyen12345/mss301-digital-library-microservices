server:
  port: 8083

spring:
  application:
    name: member-service

  # Reactive Database Setup via R2DBC
  r2dbc:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:digilib_member}
    username: ${DB_USERNAME:simpi}
    password: ${DB_PASSWORD:1231}

  # Security Decoding Parameters pointing to your Keycloak Setup
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/digilib-realm
          jwk-set-uri: http://localhost:8180/realms/digilib-realm/protocol/openid-connect/certs

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/