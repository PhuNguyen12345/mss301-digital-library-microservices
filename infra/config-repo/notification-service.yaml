server:
  port: 8085

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://${NOTIFICATION_DB_HOST:localhost}:${NOTIFICATION_DB_PORT:3306}/${NOTIFICATION_DB_NAME:notification_service_db}
    username: ${NOTIFICATION_DB_USERNAME:root}
    password: ${NOTIFICATION_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

notification:
  jobs:
    due-soon-cron: ${DUE_SOON_CRON:0 0 7 * * *}
    overdue-cron: ${OVERDUE_CRON:0 0 8 * * *}
