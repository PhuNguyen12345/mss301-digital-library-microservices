server:
  address: ${INTERNAL_SERVICE_BIND_ADDRESS:0.0.0.0}
  port: ${FINE_SERVICE_PORT:8084}

spring:
  application:
    name: fine-service

  datasource:
    url: jdbc:postgresql://${FINE_DB_HOST:localhost}:${FINE_DB_PORT:5432}/${FINE_DB_NAME:fine_service}
    username: ${FINE_DB_USERNAME:postgres}
    password: ${FINE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

services:
  internal-api-key: ${INTERNAL_API_KEY}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

sepay:
  bank: ${SEPAY_BANK:}
  account-number: ${SEPAY_ACCOUNT_NUMBER:}
  account-name: ${SEPAY_ACCOUNT_NAME:}
  webhook-secret: ${SEPAY_SECRET_KEY:${SEPAY_WEBHOOK_SECRET:}}
  qr-base-url: ${SEPAY_QR_BASE_URL:https://qr.sepay.vn/img}
  payment-code-prefix: ${SEPAY_PAYMENT_CODE_PREFIX:FINE}
  payment-ttl: ${SEPAY_PAYMENT_TTL:15m}
  webhook-replay-tolerance: ${SEPAY_WEBHOOK_REPLAY_TOLERANCE:5m}

eureka:
  instance:
    hostname: ${INTERNAL_SERVICE_HOST:fine-service}
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka/}
