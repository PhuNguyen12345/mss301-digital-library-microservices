server:
  port: 8082

spring:
  application:
    name: catalog-service
  flyway:
    enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_service_dbs
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties.hibernate.format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/