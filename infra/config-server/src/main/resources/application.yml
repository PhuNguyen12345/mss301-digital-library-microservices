server:
  port: 8888

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: config-server
  cloud:
    config: 
      server: 
        git: 
          uri: https://github.com/PhuNguyen12345/mss301-digital-library-microservices.git
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: ${CONFIG_BRANCH:main}
          search-paths: infra/config-repo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/