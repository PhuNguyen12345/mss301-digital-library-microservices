spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: member-service-auth
            uri: lb://member-service
            predicates:
              - Path=/api/v1/auth/**
          - id: member-service
            uri: lb://member-service
            predicates:
              - Path=/api/v1/members/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
