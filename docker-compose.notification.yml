name: digilib-notification

services:
  notification-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification_service_db}
      POSTGRES_USER: ${NOTIFICATION_DB_USERNAME:?NOTIFICATION_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${NOTIFICATION_DB_EXPOSED_PORT:-5441}:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${NOTIFICATION_DB_USERNAME} -d ${NOTIFICATION_DB_NAME:-notification_service_db}
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - notification-network

  notification-service:
    image: digilib/notification-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/notification-service
    restart: unless-stopped
    environment:
      NOTIFICATION_DB_HOST: notification-db
      NOTIFICATION_DB_PORT: 5432
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME:-notification_service_db}
      NOTIFICATION_DB_USERNAME: ${NOTIFICATION_DB_USERNAME:?NOTIFICATION_DB_USERNAME is required}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
      NOTIFICATION_SERVICE_PORT: 8085
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: notification-service
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"
    ports:
      - "127.0.0.1:${NOTIFICATION_SERVICE_EXPOSED_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8085'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      notification-db:
        condition: service_healthy
    networks:
      - notification-network

volumes:
  notification_db_data:

networks:
  notification-network:
    driver: bridge
