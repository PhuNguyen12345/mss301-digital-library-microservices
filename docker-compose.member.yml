name: digilib-member

services:
  member-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEMBER_DB_NAME:-digilib_member}
      POSTGRES_USER: ${MEMBER_DB_USERNAME:?MEMBER_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${MEMBER_DB_PASSWORD:?MEMBER_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${MEMBER_DB_EXPOSED_PORT:-5437}:5432"
    volumes:
      - member_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${MEMBER_DB_USERNAME} -d ${MEMBER_DB_NAME:-digilib_member}
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - member-network

  member-service:
    image: digilib/member-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/member-service
    restart: unless-stopped
    environment:
      # Container networking: never use localhost for the database here.
      MEMBER_DB_HOST: member-db
      MEMBER_DB_PORT: 5432
      MEMBER_DB_NAME: ${MEMBER_DB_NAME:-digilib_member}
      MEMBER_DB_USERNAME: ${MEMBER_DB_USERNAME:?MEMBER_DB_USERNAME is required}
      MEMBER_DB_PASSWORD: ${MEMBER_DB_PASSWORD:?MEMBER_DB_PASSWORD is required}

      MEMBER_SERVICE_PORT: 8082
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: member-service

      # This sample is intentionally standalone. The aggregate Compose file
      # will replace these values with Config Server and Eureka container URLs.
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"

      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:?KEYCLOAK_BASE_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-digilib-realm}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:?KEYCLOAK_ISSUER_URI is required}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID is required}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    ports:
      - "127.0.0.1:${MEMBER_SERVICE_EXPOSED_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8082'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      member-db:
        condition: service_healthy
    networks:
      - member-network

volumes:
  member_db_data:

networks:
  member-network:
    driver: bridge
