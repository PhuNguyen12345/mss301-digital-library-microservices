name: digilib-loan

services:
  loan-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME:-loan_service_dbs}
      POSTGRES_USER: ${LOAN_DB_USERNAME:?LOAN_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD:?LOAN_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${LOAN_DB_EXPOSED_PORT:-5439}:5432"
    volumes:
      - loan_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${LOAN_DB_USERNAME} -d ${LOAN_DB_NAME:-loan_service_dbs}
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - loan-network

  loan-service:
    image: digilib/loan-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/loan-service
    restart: unless-stopped
    environment:
      LOAN_DB_NAME: ${LOAN_DB_NAME:-loan_service_dbs}
      LOAN_DB_URL: jdbc:postgresql://loan-db:5432/${LOAN_DB_NAME:-loan_service_dbs}
      LOAN_DB_USERNAME: ${LOAN_DB_USERNAME:?LOAN_DB_USERNAME is required}
      LOAN_DB_PASSWORD: ${LOAN_DB_PASSWORD:?LOAN_DB_PASSWORD is required}
      LOAN_SERVICE_PORT: 8083
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: loan-service
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      CATALOG_SERVICE_URL: ${CATALOG_SERVICE_URL:-http://host.docker.internal:8081}
      MEMBER_SERVICE_URL: ${MEMBER_SERVICE_URL:-http://host.docker.internal:8082}
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"
      EUREKA_ENABLED: "false"
    ports:
      - "127.0.0.1:${LOAN_SERVICE_EXPOSED_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8083'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      loan-db:
        condition: service_healthy
    networks:
      - loan-network

volumes:
  loan_db_data:

networks:
  loan-network:
    driver: bridge
