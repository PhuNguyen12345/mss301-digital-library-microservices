services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: digilib-keycloak-db
    environment:
      POSTGRES_DB: keycloak-digilib
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - digilib-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1 # Production-ready Quay image
    container_name: digilib-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak-digilib
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      KC_FEATURES: token-exchange
    ports:
      - "127.0.0.1:8180:8080"
    depends_on:
      - keycloak-db
    networks:
      - digilib-network

volumes:
  keycloak_db_data:

networks:
  digilib-network:
    driver: bridge
