name: digilib-stack

services:
  eureka-server:
    image: digilib/eureka-server:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: infra/eureka-server
    restart: unless-stopped
    environment:
      INFRA_BIND_ADDRESS: 0.0.0.0
      EUREKA_INSTANCE_HOSTNAME: eureka-server
    ports:
      - "127.0.0.1:${EUREKA_EXPOSED_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8761/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - backend

  config-server:
    image: digilib/config-server:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: infra/config-server
    restart: unless-stopped
    environment:
      INFRA_BIND_ADDRESS: 0.0.0.0
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: config-server
    volumes:
      - ./infra/config-repo:/config-repo:ro
    ports:
      - "127.0.0.1:${CONFIG_SERVER_EXPOSED_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  member-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEMBER_DB_NAME:-digilib_member}
      POSTGRES_USER: ${MEMBER_DB_USERNAME:?MEMBER_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${MEMBER_DB_PASSWORD:?MEMBER_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${MEMBER_DB_EXPOSED_PORT:-5437}:5432"
    volumes:
      - member_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEMBER_DB_USERNAME} -d ${MEMBER_DB_NAME:-digilib_member}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  catalog-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalog_service_dbs}
      POSTGRES_USER: ${CATALOG_DB_USERNAME:?CATALOG_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${CATALOG_DB_EXPOSED_PORT:-5438}:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USERNAME} -d ${CATALOG_DB_NAME:-catalog_service_dbs}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  loan-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME:-loan_service_dbs}
      POSTGRES_USER: ${LOAN_DB_USERNAME:?LOAN_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD:?LOAN_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${LOAN_DB_EXPOSED_PORT:-5439}:5432"
    volumes:
      - loan_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOAN_DB_USERNAME} -d ${LOAN_DB_NAME:-loan_service_dbs}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  fine-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FINE_DB_NAME:-fine_service}
      POSTGRES_USER: ${FINE_DB_USERNAME:?FINE_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${FINE_DB_PASSWORD:?FINE_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${FINE_DB_EXPOSED_PORT:-5440}:5432"
    volumes:
      - fine_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FINE_DB_USERNAME} -d ${FINE_DB_NAME:-fine_service}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  notification-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification_service_db}
      POSTGRES_USER: ${NOTIFICATION_DB_USERNAME:?NOTIFICATION_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${NOTIFICATION_DB_EXPOSED_PORT:-5441}:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USERNAME} -d ${NOTIFICATION_DB_NAME:-notification_service_db}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  member-service:
    image: digilib/member-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/member-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: member-service
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: member-service
      MEMBER_SERVICE_PORT: 8082
      MEMBER_DB_HOST: member-db
      MEMBER_DB_PORT: 5432
      MEMBER_DB_NAME: ${MEMBER_DB_NAME:-digilib_member}
      MEMBER_DB_USERNAME: ${MEMBER_DB_USERNAME:?MEMBER_DB_USERNAME is required}
      MEMBER_DB_PASSWORD: ${MEMBER_DB_PASSWORD:?MEMBER_DB_PASSWORD is required}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:?KEYCLOAK_BASE_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-digilib-realm}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:?KEYCLOAK_ISSUER_URI is required}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID is required}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    expose:
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8082'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      member-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  catalog-service:
    image: digilib/catalog-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/catalog-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: catalog-service
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: catalog-service
      CATALOG_SERVICE_PORT: 8081
      CATALOG_DB_HOST: catalog-db
      CATALOG_DB_PORT: 5432
      CATALOG_DB_NAME: ${CATALOG_DB_NAME:-catalog_service_dbs}
      CATALOG_DB_URL: jdbc:postgresql://catalog-db:5432/${CATALOG_DB_NAME:-catalog_service_dbs}
      CATALOG_DB_USERNAME: ${CATALOG_DB_USERNAME:?CATALOG_DB_USERNAME is required}
      CATALOG_DB_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
    expose:
      - "8081"
    volumes:
      - catalog_uploads:/app/uploads/catalog
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8081'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      catalog-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  loan-service:
    image: digilib/loan-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/loan-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: loan-service
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: loan-service
      LOAN_SERVICE_PORT: 8083
      LOAN_DB_URL: jdbc:postgresql://loan-db:5432/${LOAN_DB_NAME:-loan_service_dbs}
      LOAN_DB_USERNAME: ${LOAN_DB_USERNAME:?LOAN_DB_USERNAME is required}
      LOAN_DB_PASSWORD: ${LOAN_DB_PASSWORD:?LOAN_DB_PASSWORD is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      CATALOG_SERVICE_URL: http://catalog-service:8081
      MEMBER_SERVICE_URL: http://member-service:8082
    expose:
      - "8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8083'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      loan-db:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      member-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  fine-service:
    image: digilib/fine-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/fine-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: fine-service
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: fine-service
      FINE_SERVICE_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://fine-db:5432/${FINE_DB_NAME:-fine_service}
      SPRING_DATASOURCE_USERNAME: ${FINE_DB_USERNAME:?FINE_DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${FINE_DB_PASSWORD:?FINE_DB_PASSWORD is required}
      SEPAY_BANK: ${SEPAY_BANK:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY:-}
    expose:
      - "8084"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8084'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      fine-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  notification-service:
    image: digilib/notification-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/notification-service
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: notification-service
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: notification-service
      NOTIFICATION_SERVICE_PORT: 8085
      NOTIFICATION_DB_HOST: notification-db
      NOTIFICATION_DB_PORT: 5432
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME:-notification_service_db}
      NOTIFICATION_DB_USERNAME: ${NOTIFICATION_DB_USERNAME:?NOTIFICATION_DB_USERNAME is required}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    expose:
      - "8085"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8085'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      notification-db:
        condition: service_healthy
      loan-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - backend

  api-gateway:
    image: digilib/api-gateway:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: infra/api-gateway
    restart: unless-stopped
    environment:
      CONFIG_SERVER_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_FAIL_FAST: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:?KEYCLOAK_ISSUER_URI is required}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      GATEWAY_CONNECT_TIMEOUT_MS: ${GATEWAY_CONNECT_TIMEOUT_MS:-1000}
      GATEWAY_RESPONSE_TIMEOUT: ${GATEWAY_RESPONSE_TIMEOUT:-5s}
      GATEWAY_AUTH_RESPONSE_TIMEOUT_MS: ${GATEWAY_AUTH_RESPONSE_TIMEOUT_MS:-15000}
      GATEWAY_FILE_RESPONSE_TIMEOUT_MS: ${GATEWAY_FILE_RESPONSE_TIMEOUT_MS:-30000}
      GATEWAY_CIRCUIT_TIMEOUT: ${GATEWAY_CIRCUIT_TIMEOUT:-18s}
      GATEWAY_AUTH_CIRCUIT_TIMEOUT: ${GATEWAY_AUTH_CIRCUIT_TIMEOUT:-18s}
      GATEWAY_FILE_CIRCUIT_TIMEOUT: ${GATEWAY_FILE_CIRCUIT_TIMEOUT:-35s}
      GATEWAY_BULKHEAD_MAX_CONCURRENT_CALLS: ${GATEWAY_BULKHEAD_MAX_CONCURRENT_CALLS:-50}
      GATEWAY_AUTH_BULKHEAD_MAX_CONCURRENT_CALLS: ${GATEWAY_AUTH_BULKHEAD_MAX_CONCURRENT_CALLS:-20}
      GATEWAY_FILE_BULKHEAD_MAX_CONCURRENT_CALLS: ${GATEWAY_FILE_BULKHEAD_MAX_CONCURRENT_CALLS:-20}
    ports:
      - "127.0.0.1:${API_GATEWAY_EXPOSED_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      member-service:
        condition: service_healthy
      loan-service:
        condition: service_healthy
      fine-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - backend

volumes:
  member_db_data:
  catalog_db_data:
  loan_db_data:
  fine_db_data:
  notification_db_data:
  catalog_uploads:

networks:
  backend:
    driver: bridge
