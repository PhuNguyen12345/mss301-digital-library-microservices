name: digilib-fine

services:
  fine-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FINE_DB_NAME:-fine_service}
      POSTGRES_USER: ${FINE_DB_USERNAME:?FINE_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${FINE_DB_PASSWORD:?FINE_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${FINE_DB_EXPOSED_PORT:-5440}:5432"
    volumes:
      - fine_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${FINE_DB_USERNAME} -d ${FINE_DB_NAME:-fine_service}
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - fine-network

  fine-service:
    image: digilib/fine-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/fine-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://fine-db:5432/${FINE_DB_NAME:-fine_service}
      SPRING_DATASOURCE_USERNAME: ${FINE_DB_USERNAME:?FINE_DB_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${FINE_DB_PASSWORD:?FINE_DB_PASSWORD is required}
      FINE_SERVICE_PORT: 8084
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: fine-service
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"
      SEPAY_BANK: ${SEPAY_BANK:-}
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY:-}
    ports:
      - "127.0.0.1:${FINE_SERVICE_EXPOSED_PORT:-8084}:8084"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8084'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      fine-db:
        condition: service_healthy
    networks:
      - fine-network

volumes:
  fine_db_data:

networks:
  fine-network:
    driver: bridge
