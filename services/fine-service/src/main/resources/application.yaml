server:
  address: ${INTERNAL_SERVICE_BIND_ADDRESS:0.0.0.0}
  port: ${FINE_SERVICE_PORT:8086}

spring:
  application:
    name: fine-service
  config:
    import:
      - "optional:file:.env[.properties]"
      - "${CONFIG_SERVER_IMPORT:optional:configserver:http://localhost:8888}"
  main:
    allow-bean-definition-overriding: true
