spring.application.name=fine-service
spring.config.import=optional:file:.env[.properties]
spring.main.allow-bean-definition-overriding=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fine_service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false


sepay.bank=${SEPAY_BANK:}
sepay.account-number=${SEPAY_ACCOUNT_NUMBER:}
sepay.account-name=${SEPAY_ACCOUNT_NAME:}
sepay.webhook-secret=${SEPAY_SECRET_KEY:${SEPAY_WEBHOOK_SECRET:}}
sepay.qr-base-url=${SEPAY_QR_BASE_URL:https://qr.sepay.vn/img}
sepay.payment-code-prefix=${SEPAY_PAYMENT_CODE_PREFIX:FINE}
sepay.payment-ttl=${SEPAY_PAYMENT_TTL:15m}
sepay.webhook-replay-tolerance=${SEPAY_WEBHOOK_REPLAY_TOLERANCE:5m}
