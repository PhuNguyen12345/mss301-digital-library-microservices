spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:notification_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 2525
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/digilib-realm

services:
  internal-api-key: test-only-internal-api-key-with-more-than-32-characters

eureka:
  client:
    enabled: false
