spring:
  application:
    name: member-service
  config:
    import: "optional:configserver:http://localhost:8888"

  r2dbc:
    url: ${MEMBER_DB_URL:r2dbc:postgresql://localhost:5432/digilib_member}
    username: ${MEMBER_DB_USERNAME:postgres}
    password: ${MEMBER_DB_PASSWORD:123}

  sql:
    init:
      mode: always

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/digilib-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/digilib-realm/protocol/openid-connect/certs}

server:
  port: ${MEMBER_SERVICE_PORT:8083}

services:
  internal-api-key: ${INTERNAL_API_KEY:local-dev-internal-key}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
