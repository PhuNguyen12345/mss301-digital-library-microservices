services:
  postgres:
    image: postgres:16-alpine
    container_name: digilib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:digilib_member}
      POSTGRES_USER: ${POSTGRES_USER:simpi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:1231}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simpi} -d ${POSTGRES_DB:-digilib_member}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
