server:
  port: 8081

spring:
  application:
    name: catalog-service

  datasource:
    url: jdbc:postgresql://localhost:5432/catalog_service_dbs
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    properties.hibernate.format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: "*"