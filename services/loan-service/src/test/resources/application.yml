spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:loan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false

services:
  internal-api-key: test-only-internal-api-key
  catalog:
    base-url: http://localhost:8082
  member:
    base-url: http://localhost:8083
