spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:loan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/digilib-realm

eureka:
  client:
    enabled: false

services:
  internal-api-key: test-only-internal-api-key
  catalog:
    base-url: http://localhost:8082
    default-book-value: 250000
  member:
    base-url: http://localhost:8083
  fine:
    base-url: http://localhost:8086
  notification:
    base-url: http://localhost:8085

loan:
  jobs:
    overdue-fine-enabled: false
