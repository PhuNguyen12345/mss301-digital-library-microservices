server:
  port: ${LOAN_SERVICE_PORT:8084}

spring:
  application:
    name: loan-service

  config:
    import: "optional:configserver:http://localhost:8888"

  datasource:
    url: ${LOAN_DB_URL:jdbc:postgresql://localhost:5432/loan_service_dbs}
    username: ${LOAN_DB_USERNAME:postgres}
    password: ${LOAN_DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

services:
  internal-api-key: ${INTERNAL_API_KEY:local-dev-internal-key}
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
  member:
    base-url: ${MEMBER_SERVICE_URL:http://localhost:8083}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
