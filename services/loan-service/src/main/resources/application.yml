server:
  address: ${INTERNAL_SERVICE_BIND_ADDRESS:0.0.0.0}
  port: ${LOAN_SERVICE_PORT:8084}

spring:
  application:
    name: loan-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.issuer-uri}

  config:
    import:
      # Supports IDE runs whose working directory is the repository root.
      - "optional:file:.env[.properties]"
      # Supports Maven/module runs from services/loan-service.
      - "optional:file:../../.env[.properties]"
      - "${CONFIG_SERVER_IMPORT:optional:configserver:http://localhost:8888}"

  datasource:
    url: ${LOAN_DB_URL:jdbc:postgresql://localhost:5432/loan_service_dbs}
    username: ${LOAN_DB_USERNAME:postgres}
    password: ${LOAN_DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Keep one canonical issuer in every environment. JWK discovery is derived
  # from this issuer, avoiding a second URL that can drift independently.

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/digilib-realm}

services:
  internal-api-key: ${INTERNAL_API_KEY}
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8082}
    default-book-value: ${DEFAULT_BOOK_VALUE:250000}
  member:
    base-url: ${MEMBER_SERVICE_URL:http://localhost:8083}
  fine:
    base-url: ${FINE_SERVICE_URL:http://localhost:8086}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

loan:
  jobs:
    overdue-fine-enabled: ${OVERDUE_FINE_JOB_ENABLED:true}
    overdue-fine-cron: ${OVERDUE_FINE_JOB_CRON:0 15 2 * * *}

eureka:
  instance:
    hostname: ${INTERNAL_SERVICE_HOST:localhost}
    prefer-ip-address: false
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
