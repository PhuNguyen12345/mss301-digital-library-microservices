name: CI - Loan Service

on:
  push:
    branches:
      - main
    paths:
      - services/loan-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/_service-cd.yml
      - .github/workflows/cicd-loan-service.yml
  pull_request:
    paths:
      - services/loan-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/cicd-loan-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  loan-service-ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/loan-service
      image_name: loan-service
      ignore_test_failures: true
    secrets: inherit

  loan-service-cd:
    needs: loan-service-ci
    if: github.event_name == 'push'
    uses: ./.github/workflows/_service-cd.yml
    with:
      service_name: loan-service
      host_port: "8083"
      container_port: "8083"
    secrets: inherit
