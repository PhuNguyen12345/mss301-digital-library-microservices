name: CI - Catalog Service

on:
  push:
    paths:
      - services/catalog-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-catalog-service.yml
  pull_request:
    paths:
      - services/catalog-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-catalog-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  catalog-service:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/catalog-service
      image_name: catalog-service
