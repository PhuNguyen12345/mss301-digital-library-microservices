name: CI - Fine Service

on:
  push:
    paths:
      - services/fine-service/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-fine-service.yml
  pull_request:
    paths:
      - services/fine-service/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-fine-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fine-service:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/fine-service
      image_name: fine-service
