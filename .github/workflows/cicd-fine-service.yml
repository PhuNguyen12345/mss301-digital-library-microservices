name: CI - Fine Service

on:
  push:
    branches:
      - main
    paths:
      - services/fine-service/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/_service-cd.yml
      - .github/workflows/cicd-fine-service.yml
  pull_request:
    paths:
      - services/fine-service/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/cicd-fine-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fine-service-ci:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/fine-service
      image_name: fine-service
      ignore_test_failures: true
    secrets: inherit

  fine-service-cd:
    needs: fine-service-ci
    if: github.event_name == 'push'
    uses: ./.github/workflows/_service-cd.yml
    with:
      service_name: fine-service
      host_port: "8084"
      container_port: "8084"
    secrets: inherit
