name: Reusable service CI

on:
  workflow_call:
    inputs:
      module:
        description: Maven module path to test and package
        required: true
        type: string
      image_name:
        description: Local Docker image name used by the build check
        required: true
        type: string

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run module tests
        run: >-
          mvn --batch-mode --no-transfer-progress
          -pl "${{ inputs.module }}" -am test

      - name: Build service image
        run: >-
          docker build
          --build-arg "MODULE=${{ inputs.module }}"
          --tag "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
          --tag "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest"
          .

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push service image
        if: github.event_name == 'push'
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}"
          docker push "${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest"
