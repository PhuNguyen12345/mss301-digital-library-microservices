name: CI - Notification Service

on:
  push:
    branches:
      - main
    paths:
      - services/notification-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-notification-service.yml
  pull_request:
    paths:
      - services/notification-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-notification-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notification-service:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/notification-service
      image_name: notification-service
