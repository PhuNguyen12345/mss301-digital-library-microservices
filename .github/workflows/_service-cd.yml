name: Reusable service CD

on:
  workflow_call:
    inputs:
      service_name:
        description: Service name — used as container name and image name
        required: true
        type: string
      host_port:
        description: Host port on the VM to bind
        required: true
        type: string
      container_port:
        description: Port the service listens on inside the container
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-run:
    runs-on: self-hosted
    environment:
      name: production
    steps:
      - name: Compute short commit SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Load secrets
        run: |
          gcloud secrets versions access latest --secret="mutual-secret" > secret-file

      - name: Ensure shared network exists
        run: docker network create digilib-network 2>/dev/null || true

      - name: Stop old container
        run: |
          if [ "$(docker ps -a -q -f name=^${{ inputs.service_name }}$)" ]; then
            docker stop ${{ inputs.service_name }}
            docker rm ${{ inputs.service_name }}
          fi

      - name: Run Docker container
        run: |
          docker run -d \
            --env-file secret-file \
            --name ${{ inputs.service_name }} \
            --network digilib-network \
            --network-alias ${{ inputs.service_name }} \
            --restart unless-stopped \
            -p ${{ inputs.host_port }}:${{ inputs.container_port }} \
            "${{ secrets.DOCKER_USERNAME }}/${{ inputs.service_name }}:${{ env.SHORT_SHA }}"
