name: CI - Loan Service

on:
  push:
    paths:
      - services/loan-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-loan-service.yml
  pull_request:
    paths:
      - services/loan-service/**
      - shared/common-web/**
      - pom.xml
      - Dockerfile
      - .dockerignore
      - .github/workflows/_service-ci.yml
      - .github/workflows/ci-loan-service.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  loan-service:
    uses: ./.github/workflows/_service-ci.yml
    with:
      module: services/loan-service
      image_name: loan-service
