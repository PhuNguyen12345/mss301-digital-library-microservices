name: digilib-catalog

services:
  catalog-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalog_service_dbs}
      POSTGRES_USER: ${CATALOG_DB_USERNAME:?CATALOG_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${CATALOG_DB_EXPOSED_PORT:-5438}:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${CATALOG_DB_USERNAME} -d ${CATALOG_DB_NAME:-catalog_service_dbs}
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - catalog-network

  catalog-service:
    image: digilib/catalog-service:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: services/catalog-service
    restart: unless-stopped
    environment:
      CATALOG_DB_HOST: catalog-db
      CATALOG_DB_PORT: 5432
      CATALOG_DB_NAME: ${CATALOG_DB_NAME:-catalog_service_dbs}
      CATALOG_DB_URL: jdbc:postgresql://catalog-db:5432/${CATALOG_DB_NAME:-catalog_service_dbs}
      CATALOG_DB_USERNAME: ${CATALOG_DB_USERNAME:?CATALOG_DB_USERNAME is required}
      CATALOG_DB_PASSWORD: ${CATALOG_DB_PASSWORD:?CATALOG_DB_PASSWORD is required}
      CATALOG_SERVICE_PORT: 8081
      INTERNAL_SERVICE_BIND_ADDRESS: 0.0.0.0
      INTERNAL_SERVICE_HOST: catalog-service
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_DISCOVERY_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"
      EUREKA_ENABLED: "false"
    ports:
      - "127.0.0.1:${CATALOG_SERVICE_EXPOSED_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8081'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - catalog-network

volumes:
  catalog_db_data:

networks:
  catalog-network:
    driver: bridge
